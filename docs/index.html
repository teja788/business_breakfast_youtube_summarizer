<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Breakfast — TV5 Money dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Business Breakfast <span class="sub">TV5 Money · analyst calls &amp; performance</span></h1>
    <nav id="tabs">
      <button data-tab="scorecard" class="active">Scorecard</button>
      <button data-tab="recs">Recommendations</button>
      <button data-tab="episodes">Episodes</button>
    </nav>
  </header>

  <main>
    <section id="scorecard" class="tab active"></section>
    <section id="recs" class="tab"></section>
    <section id="episodes" class="tab"></section>
  </main>

  <footer>
    <span id="generated"></span> ·
    Prices via Yahoo Finance, indicative only — <strong>not investment advice</strong>.
  </footer>

  <!-- Markdown renderer for episode summaries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
