# Custom Pages deploy replacing the auto-generated "pages build and deployment"
# workflow. actions/deploy-pages hard-caps its timeout at 10 minutes
# (MAX_TIMEOUT=600000 in the action source), and GitHub's deployment queue has
# been slower than that (2026-07-02: four consecutive deployment_queued
# timeouts). Retrying up to 3 times gives the queue ~30 minutes to drain.
name: Deploy dashboard to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - id: deploy3
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
