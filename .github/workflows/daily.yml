# ============================================================================
# SCHEDULED AUTOMATION INTENTIONALLY DISABLED — 2026-07-02
#
# The owner is not using the daily automation right now, so the `schedule:`
# cron trigger has been removed. The workflow is kept for MANUAL dispatch only
# (Actions tab → "Run workflow"). Do NOT re-add the cron trigger without:
#   (a) setting a valid ANTHROPIC_API_KEY repo secret, and
#   (b) confirming transcript acquisition actually works from GitHub runners —
#       YouTube blocks data-center IPs and kome.ai is flaky from CI
#       (see PROJECT_NOTES.md, "Key learnings").
#
# To restore the schedule, add back under `on:`:
#   schedule:
#     - cron: "30 8 * * 1-5"  # 14:00 IST Mon-Fri
# ============================================================================
name: Daily Business Breakfast update

on:
  workflow_dispatch: {}        # manual runs from the Actions tab ONLY (see header)

permissions:
  contents: write              # so the job can commit the new outputs
  issues: write                # so the failure step can open/update an issue

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fail fast if ANTHROPIC_API_KEY secret is missing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty — set it in repo Settings → Secrets before running this workflow."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deno (yt-dlp's JS runtime)
        uses: denoland/setup-deno@v2     # pinned action — no unpinned curl|sh
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pip install --upgrade yt-dlp

      # Single source of truth: daily_update.sh runs the whole 5-step pipeline
      # (process episodes → tickers → tables → scorecard → dashboard data).
      # It uses `set -e`, so any broken step fails the job BEFORE we commit —
      # we never push stale/partial data as if it succeeded.
      - name: Run daily update pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./daily_update.sh

      - name: Commit & push if anything changed
        run: |
          git config user.name "bb-bot"
          git config user.email "bb-bot@users.noreply.github.com"
          git add output tickers.json docs/data
          if git diff --cached --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily update $(date -u +%F)"
            # A human may have pushed while this job ran: rebase our commit on
            # top of the remote, then push; retry once after a re-pull. No
            # force-push — we must never discard concurrent human commits.
            git pull --rebase origin main
            if ! git push origin main; then
              echo "Push rejected (concurrent push?) — re-pulling and retrying once."
              git pull --rebase origin main
              git push origin main
            fi
          fi

      - name: Notify on failure (create or update GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Daily update failed"
          body="Workflow run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} ($(date -u +%FT%TZ))"
          # -R: don't rely on a checked-out repo (the failure may pre-date checkout)
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "\"$title\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment -R "${{ github.repository }}" "$existing" --body "$body"
          else
            gh issue create -R "${{ github.repository }}" --title "$title" --body "$body"
          fi
